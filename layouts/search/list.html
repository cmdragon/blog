{{ define "main" }}
<div class="container mx-auto px-4 sm:px-6 py-6" role="main" aria-label="搜索页面">
    <!-- 搜索头部 -->
    <header class="mb-6" role="banner">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-2xl font-bold text-blue-700 dark:text-blue-400">搜索</h1>
            <span id="search-stats" class="text-sm text-gray-500 dark:text-gray-400" aria-live="polite"></span>
        </div>
        <p class="text-sm text-gray-600 dark:text-gray-400 flex items-center">
            <iconify-icon icon="mdi:magnify" class="mr-2" width="16" height="16" aria-hidden="true"></iconify-icon>
            <span id="search-query-display" aria-live="polite">在博客中查找内容</span>
        </p>
    </header>
    
    <!-- 搜索输入框 -->
    <div class="mb-6" role="search">
        <div class="flex items-center border border-gray-200 dark:border-gray-700 rounded-md overflow-hidden focus-within:ring-2 focus-within:ring-blue-700 focus-within:border-transparent transition-shadow shadow-sm hover:shadow">
            <input 
                id="search-input" 
                type="text" 
                placeholder="输入关键词搜索…" 
                class="w-full px-4 py-2.5 border-none focus:outline-none bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 text-sm"
                aria-label="搜索内容"
                autocomplete="off"
                spellcheck="true"
                enterkeyhint="search"
            >
            <button 
                id="search-button"
                class="bg-blue-700 hover:bg-blue-800 text-white px-5 py-2.5 transition-colors"
                aria-label="搜索"
                type="button">
                <iconify-icon icon="mdi:magnify" width="18" height="18" aria-hidden="true"></iconify-icon>
            </button>
        </div>
    </div>
    
    <!-- 搜索信息栏 -->
    <div id="search-info" class="mb-4 p-3 bg-blue-50 dark:bg-blue-900/20 text-blue-800 dark:text-blue-300 rounded-md border border-blue-100 dark:border-blue-800/30 flex items-center text-sm hidden" role="status" aria-live="polite">
        <iconify-icon icon="mdi:information" width="16" height="16" class="mr-2 flex-shrink-0" aria-hidden="true"></iconify-icon>
        <span id="search-info-text">正在搜索…</span>
    </div>
    
    <!-- 加载提示 -->
    <div id="loading" class="text-center py-16" role="status" aria-live="polite">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-blue-200 dark:border-blue-800 border-t-blue-700 dark:border-t-blue-400" aria-hidden="true"></div>
        <p class="mt-3 text-sm text-gray-500 dark:text-gray-400">正在加载搜索索引…</p>
    </div>
    
    <!-- 搜索结果 -->
    <div id="search-results" class="space-y-3 hidden" role="feed" aria-label="搜索结果"></div>
    
    <!-- 无结果提示 -->
    <div id="no-results" class="hidden text-center py-16" role="status">
        <iconify-icon icon="mdi:file-search-outline" width="48" height="48" class="text-gray-300 dark:text-gray-600 mx-auto mb-3" aria-hidden="true"></iconify-icon>
        <h2 class="text-base font-medium text-gray-800 dark:text-gray-200 mb-2">未找到结果</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">尝试使用其他关键词搜索，或检查拼写是否正确</p>
        <div class="flex flex-wrap gap-2 justify-center">
            <a href="/tags/" class="text-xs px-3 py-1.5 bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded border border-gray-200 dark:border-gray-700 hover:border-blue-300 dark:hover:border-blue-700 transition-colors flex items-center">
                <iconify-icon icon="mdi:tag" class="mr-1" width="14" height="14" aria-hidden="true"></iconify-icon>
                浏览标签
            </a>
            <a href="/categories/" class="text-xs px-3 py-1.5 bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded border border-gray-200 dark:border-gray-700 hover:border-blue-300 dark:hover:border-blue-700 transition-colors flex items-center">
                <iconify-icon icon="mdi:folder" class="mr-1" width="14" height="14" aria-hidden="true"></iconify-icon>
                浏览分类
            </a>
            <a href="/archives/" class="text-xs px-3 py-1.5 bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded border border-gray-200 dark:border-gray-700 hover:border-blue-300 dark:hover:border-blue-700 transition-colors flex items-center">
                <iconify-icon icon="mdi:archive" class="mr-1" width="14" height="14" aria-hidden="true"></iconify-icon>
                浏览归档
            </a>
        </div>
    </div>
    
    <!-- 分页控件 -->
    <div id="pagination" class="mt-6 flex justify-center items-center gap-1 hidden" role="navigation" aria-label="搜索结果分页"></div>
</div>

<!-- 搜索结果模板 - 使用与通用组件一致的样式 -->
<template id="search-result-template">
  <article class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-all duration-300 border border-gray-100 dark:border-gray-700 flex flex-col md:flex-row md:max-h-[320px]">
      <div class="p-4 md:p-6 overflow-hidden flex flex-col">
          <div class="flex items-start justify-between gap-3 mb-2">
              <h2 class="text-lg md:text-xl font-bold mb-2 md:mb-3 line-clamp-2">
                  <a href="{url}" class="text-gray-900 dark:text-white hover:text-blue-700 dark:hover:text-blue-400 transition-colors duration-200">
                      {title}
                  </a>
              </h2>
              <span class="text-xs px-2 py-0.5 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 rounded flex-shrink-0">
                  {type}
              </span>
          </div>
          
          <div class="flex flex-wrap items-center text-sm text-gray-600 dark:text-gray-300 mb-2 md:mb-3 gap-2">
              <span class="flex items-center bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded-md">
                  <iconify-icon icon="mdi:calendar" class="mr-1" width="16" height="16" aria-hidden="true"></iconify-icon>
                  {date}
              </span>
              {categories}
          </div>
          
          <div class="text-gray-800 dark:text-gray-200 mb-3 line-clamp-2 md:line-clamp-3 text-sm md:text-base flex-grow">
              {content}
          </div>
          
          <div class="flex flex-wrap gap-2 mb-3 mt-auto">
              {tags}
          </div>
          
          <a href="{url}" class="inline-flex items-center text-blue-800 dark:text-blue-200 px-3 py-1.5 rounded-lg transition-colors duration-200 font-medium text-sm w-fit">
              阅读更多
              <iconify-icon icon="mdi:arrow-right" class="ml-1" width="16" height="16" aria-hidden="true"></iconify-icon>
          </a>
      </div>
  </article>
</template>

{{ $searchJS := resources.Get "js/search.js" | resources.Minify | resources.Fingerprint "sha512" }}
<script src="{{ $searchJS.RelPermalink }}" integrity="{{ $searchJS.Data.Integrity }}" defer></script>

<style>
/* 关键词高亮样式 */
.search-highlight {
    background-color: rgba(59, 130, 246, 0.15);
    color: #1d4ed8;
    padding: 0 0.125rem;
    border-radius: 0.125rem;
    font-weight: 500;
}

.dark .search-highlight {
    background-color: rgba(96, 165, 250, 0.2);
    color: #60a5fa;
}

/* 行截断 */
.line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>
{{ end }}
