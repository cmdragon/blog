{{- /* 
域名切换下拉菜单组件
参数:
  - currentPage: 当前页面对象
*/ -}}

{{ $currentPage := .currentPage }}

<div class="relative">
  <button 
    id="domain-toggle" 
    class="p-2 rounded-lg hover:bg-blue-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-300 text-gray-700 dark:text-gray-300 hover:text-primary dark:hover:text-primary"
    aria-label="切换域名"
    tabindex="0">
    <iconify-icon icon="mdi:web" width="20" height="20"></iconify-icon>
  </button>
  
  <div id="domain-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg py-1 z-50 border border-gray-200 dark:border-gray-700">
    {{ with site.Data.site.domains }}
      {{ range . }}
        <a href="{{ .url }}{{ $currentPage.RelPermalink }}" 
           class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
          {{ .name }}
        </a>
      {{ end }}
    {{ end }}
  </div>
</div>

<script>
  // 域名切换下拉菜单
  document.getElementById('domain-toggle')?.addEventListener('click', function(e) {
    e.stopPropagation();
    const dropdown = document.getElementById('domain-dropdown');
    dropdown?.classList.toggle('hidden');
  });
  
  // 点击页面其他地方关闭下拉菜单
  document.addEventListener('click', function(e) {
    const dropdown = document.getElementById('domain-dropdown');
    if (dropdown && !dropdown.classList.contains('hidden')) {
      dropdown.classList.add('hidden');
    }
  });
</script>
