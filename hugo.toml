# ===========================================
# Hugo 基础配置
# ===========================================
baseURL = 'https://blog.cmdragon.cn/'
languageCode = 'zh-cn'
title = "cmdragon's Blog"
hasCJKLanguage = true
enableRobotsTXT = true
disablePathToLower = true
enableEmoji = true

# ===========================================
# 站点参数
# ===========================================
[params]
  author = "cmdragon"
  description = "cmdragon's Blog 是一个专注于编程和技术分享的个性化网站，旨在为编程爱好者、学习者和从业者提供全面的前端开发、后端开发以及全栈开发学习资源。"
  mainSections = ["posts"]
  license = "Apache License 2.0"
  licenseURL = "/license/"
  copyRightYear = "2023"
  
  # SEO 相关
  [params.seo]
    defaultImage = "/images/logo/social-card.png"
    twitterHandle = "cmdragon_cn"
  
  # 社交链接
  [params.social]
    github = "https://github.com/cmdragon"
    email = "support@cmdragon.cn"
  
  # 评论系统
  [params.comments]
    enable = false
    [params.comments.giscus]
      repo = "username/repo-name"
      repoId = "填写你的仓库 ID"
      category = "Announcements"
      categoryId = "填写你的分类 ID"
  
  # 搜索设置
  [params.search]
    enable = true

# ===========================================
# 菜单配置
# ===========================================
[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 2
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 3
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 4
  [[menu.main]]
    identifier = "friends"
    name = "友链"
    url = "/friends/"
    weight = 5

# ===========================================
# 分类法配置
# ===========================================
[taxonomies]
  category = "categories"
  tag = "tags"

# ===========================================
# Markdown 渲染配置
# ===========================================
[markup]
  defaultMarkdownHandler = "goldmark"
  
  # Goldmark Markdown 处理器
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
    
    # 解析器配置
    [markup.goldmark.parser]
      autoHeadingID = true
      autoHeadingIDType = "github"
      [markup.goldmark.parser.attribute]
        block = true
        title = true
      
    # 渲染器配置
    [markup.goldmark.renderer]
      hardWraps = false
      unsafe = true
      xhtml = false
  
  # 代码高亮配置
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    style = "dracula"
    tabWidth = 4
  
  # 目录配置
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

# ===========================================
# 输出格式配置
# ===========================================
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "index"

# ===========================================
# 分页配置
# ===========================================
[pagination]
  pagerSize = 6

# ===========================================
# 安全配置
# ===========================================
[security.funcs]
  getenv = ["^HUGO_"]
  getJSON = ['^https?://']
  getCSV = ['^https?://']

# ===========================================
# Sitemap 配置
# ===========================================
[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"
